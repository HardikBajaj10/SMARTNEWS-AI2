<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartNews | Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body style="background:#f9f5ed; min-height:100vh; display:flex;">

    <!-- Sidebar (reader) -->
    <div class="sidebar w-56 flex-col p-5 hidden md:flex"
        style="position:sticky; top:0; height:100vh; overflow-y:auto;">
        <div class="mb-6">
            <h2 class="headline" style="font-size:1.2rem; color:#121524;">SmartNews</h2>
        </div>
        <nav class="flex-grow space-y-0.5" id="sidebarNav">
            <!-- populated by JS based on role -->
        </nav>
        <div style="border-top:1px solid #d9cbc2; padding-top:16px; margin-top:16px;">
            <button onclick="logout()" class="btn btn-ghost text-xs w-full justify-start px-0"
                style="color:#9db2bf;">Sign out</button>
        </div>
    </div>

    <!-- Main -->
    <main class="flex-1 p-6 lg:p-10 overflow-y-auto">
        <div style="max-width:640px; margin:0 auto;" class="fade-in">

            <header class="mb-8">
                <h1 class="headline" style="font-size:1.6rem; color:#121524;">Profile</h1>
                <div class="divider" style="margin:12px 0 0;"></div>
            </header>

            <!-- Identity card -->
            <div
                style="background:#fff; border:1px solid #d9cbc2; border-radius:4px; padding:28px; margin-bottom:24px; display:flex; align-items:center; gap:20px;">
                <div style="width:56px; height:56px; border-radius:50%; background:#9daccc; display:flex; align-items:center; justify-content:center; font-size:1.4rem; font-weight:700; color:#fff; flex-shrink:0;"
                    id="avatarInitial">U</div>
                <div>
                    <p class="headline" style="font-size:1.1rem; color:#121524;" id="profileName">Loading…</p>
                    <p style="font-size:13px; color:#9db2bf; margin-top:2px;" id="profileEmail"></p>
                    <span id="badge" class="badge" style="margin-top:8px; display:inline-block;"></span>
                </div>
            </div>

            <!-- Reader Stats -->
            <div id="readerStats" class="hidden"
                style="background:#fff; border:1px solid #d9cbc2; border-radius:4px; padding:0 20px; margin-bottom:24px;">
                <div class="stat-row">
                    <span style="color:#485f88; font-weight:500; font-size:14px;">Articles read</span>
                    <span class="headline" style="font-size:1.1rem; color:#121524;" id="reads">—</span>
                </div>
                <div class="stat-row">
                    <span style="color:#485f88; font-weight:500; font-size:14px;">Bookmarks</span>
                    <span class="headline" style="font-size:1.1rem; color:#121524;" id="bookmarks">—</span>
                </div>
                <div class="stat-row">
                    <span style="color:#485f88; font-weight:500; font-size:14px;">Liked articles</span>
                    <span class="headline" style="font-size:1.1rem; color:#121524;" id="likes">—</span>
                </div>
            </div>

            <!-- Publisher Stats -->
            <div id="publisherStats" class="hidden"
                style="background:#fff; border:1px solid #d9cbc2; border-radius:4px; padding:0 20px; margin-bottom:24px;">
                <div class="stat-row">
                    <span style="color:#485f88; font-weight:500; font-size:14px;">Articles Published</span>
                    <span class="headline" style="font-size:1.1rem; color:#121524;" id="pubArticles">—</span>
                </div>
                <div class="stat-row">
                    <span style="color:#485f88; font-weight:500; font-size:14px;">Lifetime Reads</span>
                    <span class="headline" style="font-size:1.1rem; color:#121524;" id="pubReads">—</span>
                </div>
                <div class="stat-row">
                    <span style="color:#485f88; font-weight:500; font-size:14px;">Unique Readers</span>
                    <span class="headline" style="font-size:1.1rem; color:#121524;" id="pubUnique">—</span>
                </div>
            </div>

            <!-- Preferences (Reader Only) -->
            <div id="preferencesBox" class="hidden"
                style="background:#fff; border:1px solid #d9cbc2; border-radius:4px; padding:20px;">
                <p class="section-label mb-3">Your topics</p>
                <div id="prefTags" class="flex flex-wrap gap-2">
                    <p style="color:#9db2bf; font-size:13px; font-style:italic;">No preferences set.</p>
                </div>
                <div class="mt-4">
                    <a href="onboarding.html" class="btn btn-outline text-xs" style="padding:7px 16px;">Update
                        Topics</a>
                </div>
            </div>
        </div>
    </main>

    <script src="fetchProfile.js"></script>
    <script src="profile.js"></script>
</body>

</html>
