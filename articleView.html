<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartNews | Article</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body style="background:#f9f5ed; min-height:100vh;">

    <!-- Top Nav -->
    <nav style="background:#f0ecdd; border-bottom:1px solid #d9cbc2; position:sticky; top:0; z-index:50;">
        <div
            style="max-width:720px; margin:0 auto; padding:14px 24px; display:flex; justify-content:space-between; align-items:center;">
            <a href="dashboard.html" class="btn btn-ghost text-sm" style="padding:6px 0; color:#485f88;">← Back to
                Feed</a>
            <span class="headline" style="font-size:1rem; color:#121524;">SmartNews</span>
            <div class="flex gap-2">
                <button onclick="like()" class="btn btn-outline text-xs" style="padding:6px 14px;">Recommend</button>
                <button onclick="bookmark()" class="btn btn-ghost text-xs"
                    style="padding:6px 14px; color:#485f88;">Bookmark</button>
            </div>
        </div>
    </nav>

    <!-- Article Content -->
    <article style="max-width:680px; margin:0 auto; padding:48px 24px 80px;">
        <header class="mb-8 fade-in">
            <div style="margin-bottom:16px;">
                <span id="categoryBadge" class="badge" style="background:#dde6ed; color:#485f88;"></span>
            </div>
            <h1 id="title" class="headline"
                style="font-size:2rem; line-height:1.25; color:#121524; margin-bottom:16px;"></h1>
            <p id="meta" class="text-sm" style="color:#9db2bf; padding-bottom:20px; border-bottom:1px solid #d9cbc2;">
            </p>
        </header>

        <div id="content" class="fade-in"
            style="font-family:'Merriweather',Georgia,serif; font-size:1rem; line-height:1.85; color:#2c2c2c;"></div>

        <!-- Footer actions -->
        <!-- Article actions footer -->
        <footer class="mt-16 slide-up"
            style="border-top:1px solid #d9cbc2; padding-top:24px; display:flex; justify-content:space-between; align-items:center;">
            <span class="text-sm" style="color:#9db2bf; font-style:italic;">Enjoyed this article?</span>
            <div class="flex gap-3">
                <button onclick="like()" class="btn btn-outline text-xs" style="padding:8px 18px;">👍 Recommend</button>
                <button onclick="bookmark()" class="btn btn-ghost text-xs"
                    style="padding:8px 18px; border:1px solid #d9cbc2; color:#485f88;">🔖 Save</button>
                <button onclick="finishReading()" class="btn btn-primary text-xs" style="padding:8px 18px;">Done Reading
                    →</button>
            </div>
        </footer>

        <!-- ── Comments section ── -->
        <section class="mt-12 fade-in">
            <div style="display:flex; align-items:baseline; gap:12px; margin-bottom:20px;">
                <h2 class="headline" style="font-size:1.1rem; color:#121524;">Discussion</h2>
                <span id="commentCount" style="font-size:12px; color:#9db2bf;"></span>
            </div>

            <!-- Comment input -->
            <div style="display:flex; gap:10px; margin-bottom:24px;">
                <textarea id="commentInput" class="input-field flex-1" rows="2" placeholder="Share your thoughts…"
                    style="resize:none;"></textarea>
                <button onclick="postComment()" class="btn btn-primary"
                    style="align-self:flex-end; padding:10px 20px; white-space:nowrap;">
                    Post
                </button>
            </div>

            <!-- Comment list -->
            <div id="commentList" style="display:flex; flex-direction:column; gap:0;"></div>

            <button id="loadMoreComments" onclick="loadComments(true)" class="btn btn-ghost text-xs mt-4"
                style="color:#9db2bf; display:none;">Load more comments</button>
        </section>
    </article>

    <script src="fetchProfile.js"></script>
    <script src="article.js"></script>
</body>

</html>
