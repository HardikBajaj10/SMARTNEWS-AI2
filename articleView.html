<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartNews | Reading Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .article-content p {
            margin-bottom: 1.5rem;
            color: #cbd5e1;
            font-size: 1.125rem;
            line-height: 1.8;
        }
    </style>
</head>

<body class="bg-gray-900 text-white min-h-screen">

    <!-- Navigation / Header -->
    <header
        class="p-6 lg:px-12 flex justify-between items-center border-b border-gray-800 sticky top-0 bg-gray-900/80 backdrop-blur-md z-50">
        <div class="flex items-center space-x-4">
            <button onclick="window.location.href='dashboard.html'"
                class="text-gray-400 hover:text-white transition-colors flex items-center">
                <span class="mr-2 text-xl">←</span> Back to Feed
            </button>
            <div class="h-6 w-px bg-gray-800"></div>
            <span id="categoryBadge"
                class="px-2 py-0.5 rounded-md bg-blue-500/10 text-blue-400 text-[10px] font-bold uppercase tracking-widest">
                Category
            </span>
        </div>

        <div class="flex items-center space-x-2">
            <button onclick="like()"
                class="p-3 rounded-xl bg-gray-800 hover:bg-red-500/10 hover:text-red-500 transition-all border border-gray-700"
                title="Like">
                ❤️
            </button>
            <button onclick="bookmark()"
                class="p-3 rounded-xl bg-gray-800 hover:bg-blue-500/10 hover:text-blue-500 transition-all border border-gray-700"
                title="Bookmark">
                🔖
            </button>
            <button onclick="finishReading()" class="btn-primary ml-4">
                Finish Reading
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6 lg:p-12 fade-in">
        <div class="mb-12">
            <div id="meta" class="text-[10px] text-gray-500 font-black uppercase tracking-[0.2em] mb-4">
                Published by Author | Location
            </div>
            <h1 id="title" class="text-4xl lg:text-5xl font-black mb-8 leading-tight">
                Loading Article Headline...
            </h1>
            <div class="flex items-center space-x-4 text-sm text-gray-400 border-y border-gray-800 py-4">
                <span id="readTimeMock">Estimated 4 min read</span>
                <span>•</span>
                <span id="dateMock">Updated Today</span>
            </div>
        </div>

        <article id="content" class="article-content">
            <!-- Content injected here -->
            <p class="animate-pulse bg-gray-800 h-4 w-full rounded mb-4"></p>
            <p class="animate-pulse bg-gray-800 h-4 w-3/4 rounded mb-4"></p>
            <p class="animate-pulse bg-gray-800 h-4 w-5/6 rounded mb-4"></p>
        </article>

        <footer class="mt-20 pt-12 border-t border-gray-800 text-center">
            <div class="mb-8">
                <h3 class="text-xl font-bold mb-2">Did you enjoy this article?</h3>
                <p class="text-gray-400 text-sm">Your feedback helps us personalize your intelligence feed.</p>
            </div>
            <div class="flex justify-center space-x-4">
                <button onclick="like()"
                    class="px-6 py-2 rounded-xl bg-gray-800 border border-gray-700 hover:bg-gray-700 transition-all">
                    Recommend It
                </button>
                <button onclick="finishReading()"
                    class="px-6 py-2 rounded-xl bg-blue-600 hover:bg-blue-500 transition-all font-bold">
                    Close & Discover More
                </button>
            </div>
        </footer>
    </main>

    <script src="data/articles.js"></script>
    <script src="js/article.js"></script>
    <script>
        // Inline UI updates that depend on the article.js loading first
        const cat = localStorage.getItem('currentCategory');
        if (cat) document.getElementById('categoryBadge').innerText = cat;
    </script>
</body>

</html>
