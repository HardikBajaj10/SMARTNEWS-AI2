<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartNews | Join the Evolution</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .role-option {
      background: rgba(15, 23, 42, 0.4);
      border: 2px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .role-option.selected {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.1);
      transform: scale(1.02);
    }
  </style>
</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen p-4">
  <div class="glass-card p-10 w-full max-w-lg fade-in">
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-white mb-2">Create Account</h1>
      <p class="text-gray-400">Join our community of elite readers and writers.</p>
    </div>

    <form class="space-y-6" id="registerForm">
      <div class="grid grid-cols-2 gap-4 mb-8">
        <div id="roleUser" onclick="selectRole('user')"
          class="role-option p-4 rounded-xl cursor-pointer text-center selected">
          <div class="text-2xl mb-1">📖</div>
          <div class="font-bold text-white">Reader</div>
          <div class="text-xs text-gray-400">Personalized Feed</div>
        </div>
        <div id="roleAdmin" onclick="selectRole('admin')" class="role-option p-4 rounded-xl cursor-pointer text-center">
          <div class="text-2xl mb-1">✍️</div>
          <div class="font-bold text-white">Publisher</div>
          <div class="text-xs text-gray-400">Write & Analyze</div>
        </div>
      </div>

      <input type="hidden" id="role" value="user">

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Full Identity</label>
        <input id="userName" type="text" placeholder="John Doe"
          class="w-full p-4 bg-gray-800 bg-opacity-50 border border-gray-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
        <input id="email" type="email" placeholder="name@company.com"
          class="w-full p-4 bg-gray-800 bg-opacity-50 border border-gray-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Security Key</label>
        <input id="password" type="password" placeholder="••••••••"
          class="w-full p-4 bg-gray-800 bg-opacity-50 border border-gray-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" />
      </div>

      <button type="button" onclick="register()" class="btn-primary w-full py-4 text-lg mt-4">
        Initialize Account
      </button>
    </form>

    <div class="mt-8 text-center border-t border-gray-800 pt-6">
      <p class="text-sm text-gray-400">
        Already part of SmartNews?
        <a href="index.html" class="text-blue-400 font-semibold hover:underline ml-1">Login here</a>
      </p>
    </div>
  </div>

  <script>
    function selectRole(role) {
      document.getElementById('role').value = role;
      document.querySelectorAll('.role-option').forEach(el => el.classList.remove('selected'));
      if (role === 'user') document.getElementById('roleUser').classList.add('selected');
      else document.getElementById('roleAdmin').classList.add('selected');
    }

    function register() {
      const name = document.getElementById('userName').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value.trim();
      const role = document.getElementById('role').value;

      if (!name || !email || !password) {
        alert("Please fill all identity fields.");
        return;
      }

      // Get existing users or empty array
      let users = JSON.parse(localStorage.getItem('registeredUsers')) || [];

      // Check if email exists
      if (users.find(u => u.email === email)) {
        alert("This identity is already registered.");
        return;
      }

      const newUser = { name, email, password, role };
      users.push(newUser);
      localStorage.setItem('registeredUsers', JSON.stringify(users));

      alert("Registration complete. Welcome to SmartNews.");
      window.location.href = "index.html";
    }
  </script>
</body>

</html>
