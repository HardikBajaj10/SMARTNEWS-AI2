<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartNews | Create Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body
  style="background:#f9f5ed; min-height:100vh; display:flex; align-items:flex-start; justify-content:center; padding:48px 16px;">

  <div class="fade-in" style="width:100%; max-width:460px;">

    <!-- Header -->
    <div class="mb-8">
      <a href="index.html" class="text-xs font-semibold uppercase tracking-widest"
        style="color:#9db2bf; text-decoration:none;">← Back to Sign In</a>
      <h1 class="headline mt-4" style="font-size:1.8rem; color:#121524;">Create your account</h1>
      <p class="text-sm mt-1" style="color:#9db2bf;">Join thousands of readers who let SmartNews do the searching.</p>
    </div>

    <!-- Role Selection -->
    <div class="mb-6">
      <label class="section-label">I am a</label>
      <div class="flex gap-3 mt-1">
        <div id="roleUser" onclick="selectRole('user')" class="flex-1 p-4 cursor-pointer transition-all"
          style="border:1px solid #d9cbc2; border-radius:4px; background:#fff;">
          <p class="font-semibold text-sm" style="color:#121524;">📖 Reader</p>
          <p class="text-xs mt-1" style="color:#9db2bf;">Discover and consume personalised news</p>
        </div>
        <div id="roleAdmin" onclick="selectRole('admin')" class="flex-1 p-4 cursor-pointer transition-all"
          style="border:1px solid #d9cbc2; border-radius:4px; background:#fff;">
          <p class="font-semibold text-sm" style="color:#121524;">✍️ Publisher</p>
          <p class="text-xs mt-1" style="color:#9db2bf;">Write, publish, and track your content</p>
        </div>
      </div>
    </div>

    <!-- Form Fields -->
    <div class="space-y-4 mb-6">
      <div>
        <label class="block text-xs font-semibold mb-1.5 uppercase tracking-widest" style="color:#485f88;">Full
          Name</label>
        <input id="userName" type="text" class="input-field" placeholder="">
      </div>
      <div>
        <label class="block text-xs font-semibold mb-1.5 uppercase tracking-widest" style="color:#485f88;">Email</label>
        <input id="email" type="email" class="input-field" placeholder="you@example.com">
      </div>
      <div>
        <label class="block text-xs font-semibold mb-1.5 uppercase tracking-widest"
          style="color:#485f88;">Password</label>
        <input id="password" type="password" class="input-field" placeholder="Your password">
      </div>
    </div>

    <button onclick="register()" class="btn btn-primary w-full justify-center" style="padding:11px 20px;">
      Create Account
    </button>

    <p class="text-xs text-center mt-5" style="color:#9db2bf;">
      Already have an account? <a href="index.html"
        style="color:#485f88; font-weight:600; text-decoration:underline;">Sign in</a>
    </p>
  </div>

  <script>
    let selectedRole = 'user';

    function selectRole(role) {
      selectedRole = role;
      document.getElementById('roleUser').style.borderColor = role === 'user' ? '#485f88' : '#d9cbc2';
      document.getElementById('roleUser').style.background = role === 'user' ? '#dde6ed' : '#fff';
      document.getElementById('roleAdmin').style.borderColor = role === 'admin' ? '#485f88' : '#d9cbc2';
      document.getElementById('roleAdmin').style.background = role === 'admin' ? '#dde6ed' : '#fff';
    }

    selectRole('user'); // default

    async function register() {
      const name = document.getElementById('userName').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value.trim();
      const role = selectedRole;

      if (!name || !email || !password) {
        alert("Please fill in all fields.");
        return;
      }

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, role })
        });

        const data = await res.json();
        if (!res.ok) {
          alert(data.message || 'Registration failed');
          return;
        }

        // Store ONLY the token
        localStorage.setItem('token', data.token);

        window.location.href = data.role === 'admin' ? "admin.html" : "onboarding.html";
      } catch (err) {
        console.error(err);
        alert("An error occurred during registration.");
      }
    }
  </script>
</body>

</html>
