<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartNews | Publisher Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body style="background:#f9f5ed; min-height:100vh; display:flex;">

    <!-- Sidebar -->
    <div class="sidebar w-56 flex-col p-5 hidden md:flex"
        style="position:sticky; top:0; height:100vh; overflow-y:auto;">
        <div class="mb-6">
            <h2 class="headline" style="font-size:1.2rem; color:#121524;">SmartNews</h2>
            <p class="text-xs mt-0.5"
                style="color:#9db2bf; letter-spacing:0.08em; text-transform:uppercase; font-weight:600;">Publisher
                Studio</p>
        </div>

        <nav class="flex-grow space-y-0.5">
            <a href="admin.html" class="nav-link active"><span class="mr-2.5">✍️</span>Write</a>
            <a href="analytics.html" class="nav-link"><span class="mr-2.5">📊</span>Analytics</a>
            <a href="bookmarks.html" class="nav-link"><span class="mr-2.5">🔖</span>Bookmarks</a>
            <a href="likes.html" class="nav-link"><span class="mr-2.5">❤️</span>Liked</a>
            <a href="profile.html" class="nav-link"><span class="mr-2.5">👤</span>Profile</a>
        </nav>

        <div style="border-top:1px solid #d9cbc2; padding-top:16px; margin-top:16px;">
            <div class="flex items-center space-x-2 mb-3">
                <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0"
                    style="background:#485f88;" id="userInitial">A</div>
                <div class="min-w-0">
                    <p class="text-sm font-semibold truncate" style="color:#121524;" id="userNameDisplay">Admin</p>
                    <p class="text-xs truncate" style="color:#9db2bf;" id="userEmailDisplay"></p>
                </div>
            </div>
            <button onclick="logout()" class="btn btn-ghost text-xs w-full justify-start px-0"
                style="color:#9db2bf;">Sign out</button>
        </div>
    </div>

    <!-- Main -->
    <main class="flex-1 p-6 lg:p-10 overflow-y-auto">
        <div style="max-width:900px; margin:0 auto;" class="fade-in">

            <header class="mb-8">
                <h1 class="headline" style="font-size:1.6rem; color:#121524;">New Article</h1>
                <div class="divider" style="margin:12px 0 0;"></div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">

                <!-- Form -->
                <div class="lg:col-span-3 space-y-5">
                    <div>
                        <label class="section-label" style="display:block; margin-bottom:6px;">Headline</label>
                        <input id="title" type="text" class="input-field" placeholder="What's the story?">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="section-label" style="display:block; margin-bottom:6px;">Category</label>
                            <select id="category" class="input-field">
                                <option>Technology</option>
                                <option>Business</option>
                                <option>Sports</option>
                                <option>Health</option>
                                <option>Entertainment</option>
                                <option>Science</option>
                                <option>Politics</option>
                                <option>International</option>
                            </select>
                        </div>
                        <div>
                            <label class="section-label" style="display:block; margin-bottom:6px;">Location</label>
                            <input id="location" type="text" class="input-field" placeholder="City, Country">
                        </div>
                    </div>
                    <div>
                        <label class="section-label" style="display:block; margin-bottom:6px;">Content</label>
                        <textarea id="content" class="input-field" rows="9" placeholder="Write your article…"
                            style="resize:vertical;"></textarea>
                    </div>
                    <div class="flex items-center gap-3">
                        <input id="isToday" type="checkbox" style="width:14px; height:14px; accent-color:#485f88;">
                        <label for="isToday" class="text-sm" style="color:#485f88; cursor:pointer;">Mark as Breaking
                            News</label>
                    </div>
                    <button onclick="addArticle()" class="btn btn-primary" style="padding:11px 32px;">
                        Publish Article →
                    </button>
                </div>

                <!-- Recent Articles -->
                <div class="lg:col-span-2">
                    <p class="section-label mb-4">Recent Publications</p>
                    <div id="articleList" class="space-y-0"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="fetchProfile.js"></script>
    <script src="admin.js"></script>
</body>

</html>
